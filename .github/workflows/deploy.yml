name: Deploy to Hostinger (Build + FTP Sync)

on:
  push:
    branches:
      - main  # runs every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build for production
      - name: Build
        run: npm run build

      # 5. Copy root assets into dist for deployment
      #   (OG meta / inline images / favicon are hardcoded to root paths)
      - name: Copy root assets to dist
        run: |
          cp robots.txt dist/ 2>/dev/null || true
          cp sitemap.xml dist/ 2>/dev/null || true
          cp favicon.svg dist/ 2>/dev/null || true
          cp squareframe_preview.png dist/ 2>/dev/null || true

      # 6. Deploy built files to Hostinger via FTP
      - name: Sync dist to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
