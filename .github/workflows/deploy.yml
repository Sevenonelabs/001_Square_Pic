name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # runs every time you push to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build the production site
      - name: Build
        run: npm run build

      # 5. Deploy dist/ to Hostinger via FTP
      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}    # e.g. ftp.squarepic.io
          username: ${{ secrets.FTP_USERNAME }}  # your Hostinger FTP username
          password: ${{ secrets.FTP_PASSWORD }}  # your Hostinger FTP password
          local-dir: ./dist/                     # upload only the built files
          server-dir: /public_html/              # Hostinger root directory
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
