name: Deploy to Hostinger (FTP Sync)

on:
  push:
    branches:
      - main  # runs every time you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Deploy public_html/ to Hostinger via FTP
      - name: Sync public_html to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.93.127.208.9 }}
          username: ${{ secrets.u338411361 }}
          password: ${{ secrets.Ftp2021@ }}
          local-dir: ./public_html/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
